# Leader key: Ctrl + B or Ctrl + /
set -g prefix  C-b
set -g prefix2 C-_
bind C-b send-prefix
bind C-_ send-prefix -2

# Pane splitting (default keys)
# Ctrl + / %  → vertical
# Ctrl + / "  → horizontal

# Pane navigation (no prefix)
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R

# Smooth scroll the selected pane (enters copy mode; exits at bottom)
# Ctrl held = double speed.
bind -n S-Up     copy-mode -e \; send-keys -X -N 1 scroll-up
bind -n C-S-Up   copy-mode -e \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi S-Up     send-keys -X -N 1 scroll-up
bind -T copy-mode-vi S-Down   send-keys -X -N 1 scroll-down
bind -T copy-mode-vi C-S-Up   send-keys -X -N 2 scroll-up
bind -T copy-mode-vi C-S-Down send-keys -X -N 2 scroll-down

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind 1 select-pane -t 0
bind 2 select-pane -t 1
bind 3 select-pane -t 2
bind 4 select-pane -t 3

# 2x2 grid: split horizontally, then split each vertically
# Prompts for bottom-pane cwd (defaults to current path)
bind g command-prompt -p "bottom cwd:" -I "#{pane_current_path}" "split-window -v -c '%1' ; split-window -h -c '%1' ; select-pane -U ; split-window -h -c '#{pane_current_path}' ; select-pane -L"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Nice-to-have defaults
set -g mouse on
set -g history-limit 10000
set -g mode-keys vi
